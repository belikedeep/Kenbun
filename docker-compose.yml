version: "3.8"

services:
  # Control Plane Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  # High-Throughput Distributed State
  redis:
    image: bitnami/redis-cluster:7.2
    environment:
      - REDIS_CLUSTER_REPLICAS=0
      - REDIS_NODES=redis
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379:6379"

  # High-Ingestion Message Broker (Kafka compatible)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-schema-registry-addr internal://redpanda:8081,external://localhost:18081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytical Data Store (Data Plane)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The Gateway App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://gateway:gateway@postgres:5432/gateway
      - REDIS_ADDRS=redis:6379
      - KAFKA_BROKERS=redpanda:9092
      - CLICKHOUSE_ADDR=clickhouse:9000
    ports:
      - "8080:8080"
